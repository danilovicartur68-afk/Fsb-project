<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FSB System - Меню</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        
        .main-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: auto;
            z-index: 2;
            opacity: 0;
            animation: introImage 5s ease-in-out forwards;
        }

        
        .content {
            position: relative;
            z-index: 5;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 3.5s; 
        }

        /* Стили контейнера кнопок */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            align-items: center;
        }

        /* Стили кнопок-ссылок */
        .btn {
            width: 250px;
            padding: 12px 20px;
            background: transparent;
            color: #ccc;
            border: 1px solid #444;
            text-decoration: none; /* Убираем подчеркивание ссылки */
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
            display: block;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        @keyframes introImage {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0.1; z-index: 0; transform: translate(-50%, -50%) scale(0.9); } 
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        h1 { font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <img src="FSB 2.jpg" alt="ФСБ" class="main-image">

    <div class="content">
        <h1>Федеральная служба безопаности.</h1>
        <h2>Давидовской федерации.</h2>
        <P> Выберите пункт который вам требуется.</P>
        <div class="button-container">
            <!-- ЗАМЕНИ НАЗВАНИЯ ФАЙЛОВ ТУТ -->
            <a href="info.html" class="btn">Посмотреть Информацию</a>
            <a href="apply.html" class="btn">Подать заявку</a>
            <a href="contracts.html" class="btn">Контракты</a>
            <a href="permission.html" class="btn">Разрешение на</a>
        </div>
    </div>

</body>
</html>
